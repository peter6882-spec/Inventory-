        { id: 56, category: "清潔用品", name: "地板清潔劑", freezerStock: 3, chillerStock: 1, threshold: 1, unit: "桶" },
        { id: 57, category: "清潔用品", name: "洗碗精", freezerStock: 4, chillerStock: 1, threshold: 1, unit: "桶" },
        { id: 58, category: "清潔用品", name: "洗手乳", freezerStock: 4, chillerStock: 1, threshold: 1, unit: "桶" },
        { id: 59, category: "清潔用品", name: "洗手液", freezerStock: 4, chillerStock: 1, threshold: 1, unit: "桶" }
    ];

    let inventoryData = [];
    let currentCategoryFilter = '全部';
    const categoriesList = ['全部', '肉類', '海鮮', '臘腸', '薯條起司', '蔬菜', '罐頭類', '粉', '醬料', '外帶醬料', '包材', '衛生用品', '清潔用品'];

    db.ref('inventory').on('value', (snap) => {
        if (snap.exists()) {
            inventoryData = Array.isArray(snap.val()) ? snap.val().filter(i => i !== null) : Object.values(snap.val()).filter(i => i !== null);
            document.getElementById('syncStatus').innerText = "🟢 已與 Firebase 同步";
        } else {
            db.ref('inventory').set(fullData);
            inventoryData = fullData;
        }
        render();
    });

    function render() {
        const tbody = document.getElementById('inventoryBody');
        const btnContainer = document.getElementById('filterButtons');
        tbody.innerHTML = '';
        btnContainer.innerHTML = '';
        categoriesList.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${currentCategoryFilter === cat ? 'active' : ''}`;
            btn.textContent = cat;
            btn.onclick = () => { currentCategoryFilter = cat; render(); };
            btnContainer.appendChild(btn);
        });
        inventoryData.forEach((item, i) => {
            if (currentCategoryFilter !== '全部' && item.category !== currentCategoryFilter) return;
            tbody.innerHTML += `<tr><td>${item.category}</td><td>${item.name}</td><td>${item.threshold}</td><td>${item.freezerStock}</td><td><div class="action-group"><input type="number" id="in-${i}" class="qty-input"><button class="btn-op btn-transfer" onclick="op(${i},'tran')">移</button><button class="btn-op btn-consume" onclick="op(${i},'cons')">扣</button><button class="btn-op btn-supplier" onclick="op(${i},'supp')">進</button></div></td><td>${item.chillerStock}</td><td>${item.freezerStock <= item.threshold ? '⚠️補' : '✅足'}</td></tr>`;
        });
    }

    function op(i, type) {
        const val = parseFloat(document.getElementById(`in-${i}`).value);
        if (!val || val <= 0) return alert("請輸入數量");
        let item = inventoryData[i];
        if (type === 'tran' && item.freezerStock >= val) { item.freezerStock -= val; item.chillerStock += val; }
        else if (type === 'cons' && item.chillerStock >= val) { item.chillerStock -= val; }
        else if (type === 'supp') { item.freezerStock += val; }
        else return alert("庫存不足");
        db.ref('inventory').set(inventoryData);
        db.ref('logs').push({time: new Date().toLocaleTimeString(), text: `${type} ${item.name} ${val}`});
    }

    function clearLogs() { db.ref('logs').remove(); }
</script>
