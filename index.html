    let inventoryData = [];
    let currentCategory = '全部';
    const categories = ['全部', '肉類', '海鮮', '臘腸', '薯條起司', '蔬菜', '罐頭類', '粉', '醬料', '外帶醬料', '包材', '衛生用品', '清潔用品'];

    db.ref('inventory').on('value', (snap) => {
        if (!snap.exists()) { db.ref('inventory').set(fullData); }
        inventoryData = snap.val() || fullData;
        render();
    });

    function render() {
        document.getElementById('syncStatus').innerText = "🟢 已與雲端同步";
        const btnContainer = document.getElementById('filterButtons');
        btnContainer.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${currentCategory === cat ? 'active' : ''}`;
            btn.textContent = cat;
            btn.onclick = () => { currentCategory = cat; render(); };
            btnContainer.appendChild(btn);
        });

        const tbody = document.getElementById('inventoryBody');
        tbody.innerHTML = '';
        inventoryData.forEach((item, i) => {
            if (currentCategory !== '全部' && item.category !== currentCategory) return;
            tbody.innerHTML += `<tr><td>${item.category}</td><td>${item.name}</td><td>${item.threshold}</td><td>${item.freezerStock}</td><td><div class="action-group"><input type="number" id="in-${i}" class="qty-input"><button class="btn-op btn-transfer" onclick="op(${i},'tran')">移</button><button class="btn-op btn-consume" onclick="op(${i},'cons')">扣</button><button class="btn-op btn-supplier" onclick="op(${i},'supp')">進</button></div></td><td>${item.chillerStock}</td><td>${item.freezerStock <= item.threshold ? '⚠️補' : '✅足'}</td></tr>`;
        });
    }

    function op(i, type) {
        const val = parseFloat(document.getElementById(`in-${i}`).value);
        if (!val || val <= 0) return alert("請輸入數量");
        if (type === 'tran' && inventoryData[i].freezerStock >= val) { inventoryData[i].freezerStock -= val; inventoryData[i].chillerStock += val; }
        else if (type === 'cons' && inventoryData[i].chillerStock >= val) { inventoryData[i].chillerStock -= val; }
        else if (type === 'supp') { inventoryData[i].freezerStock += val; }
        else return alert("庫存不足");
        db.ref('inventory').set(inventoryData);
    }
</script>
