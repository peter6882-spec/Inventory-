        button.btn-op { padding: 6px 10px; border: none; cursor: pointer; color: white; border-radius: 4px; font-weight: bold; font-size: 14px; line-height: 1; }
        .btn-transfer { background: var(--transfer-color); } .btn-consume { background: var(--danger-color); } .btn-supplier { background: #78909c; }
        .log-container { max-height: 150px; overflow-y: auto; background: #fafafa; padding: 10px; font-size: 13px; margin-top: 10px; border: 1px solid #eee; border-radius: 6px;}
        .low-stock { background-color: #fff8f8; }
        .alert-box { background-color: #ffebee; border-left: 5px solid #c62828; padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none; }

        { id: 52, category: "衛生用品", name: "濕紙巾", freezerStock: 5, chillerStock: 1, threshold: 2, unit: "箱" },
        { id: 53, category: "衛生用品", name: "廚房手套S", freezerStock: 6, chillerStock: 2, threshold: 2, unit: "盒" },
        { id: 54, category: "衛生用品", name: "廚房手套", freezerStock: 6, chillerStock: 2, threshold: 2, unit: "盒" },
        { id: 55, category: "衛生用品", name: "一次性手套", freezerStock: 10, chillerStock: 2, threshold: 3, unit: "袋" },
        { id: 56, category: "清潔用品", name: "地板清潔劑", freezerStock: 3, chillerStock: 1, threshold: 1, unit: "桶" },
        { id: 57, category: "清潔用品", name: "洗碗精", freezerStock: 4, chillerStock: 1, threshold: 1, unit: "桶" },
        { id: 58, category: "清潔用品", name: "洗手乳", freezerStock: 4, chillerStock: 1, threshold: 1, unit: "桶" },
        { id: 59, category: "清潔用品", name: "洗手液", freezerStock: 4, chillerStock: 1, threshold: 1, unit: "桶" }
    ];

    let inventoryData = [];
    let currentCategory = '全部';

    // 從雲端讀取
    db.ref('inventory').on('value', (snap) => {
        inventoryData = snap.val() || defaultData;
        render();
    });

    function render() {
        const tbody = document.getElementById('inventoryBody');
        const container = document.getElementById('filterContainer');
        const alertList = document.getElementById('alertList');
        const alertBox = document.getElementById('alertBox');
        
        tbody.innerHTML = '';
        container.innerHTML = '';
        
        // 產生篩選按鈕
        ['全部', ...new Set(defaultData.map(i => i.category))].forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${currentCategory === cat ? 'active' : ''}`;
            btn.textContent = cat;
            btn.onclick = () => { currentCategory = cat; render(); };
            container.appendChild(btn);
        });

        let alerts = [];
        inventoryData.forEach((item, i) => {
            if (currentCategory !== '全部' && item.category !== currentCategory) return;
            const isLow = item.freezerStock <= item.threshold;
            if (isLow) alerts.push(`<li>【${item.category}】${item.name} (剩: ${item.freezerStock}${item.unit})</li>`);

            tbody.innerHTML += `<tr class="${isLow ? 'low-stock' : ''}">
                <td style="color:#777;">${item.category}</td>
                <td style="text-align: left;"><strong>${item.name}</strong></td>
                <td><input type="number" value="${item.threshold}" style="width:40px;" onchange="updateVal(${i}, 'threshold', this.value)"></td>
                <td style="font-weight:bold; color:${isLow?'#c62828':'#455a64'}">${item.freezerStock} ${item.unit}</td>
                <td>
                    <div class="action-group">
                        <input type="number" id="in-${i}" class="qty-input" placeholder="數量">
                        <button class="btn-op btn-transfer" onclick="op(${i},'tran')">移</button>
                        <button class="btn-op btn-consume" onclick="op(${i},'cons')">扣</button>
                        <button class="btn-op btn-supplier" onclick="op(${i},'supp')">進</button>
                    </div>
                </td>
                <td style="font-weight:bold; color:#1565c0">${item.chillerStock} ${item.unit}</td>
                <td>${isLow ? '⚠️補' : '✅足'}</td>
            </tr>`;
        });
        alertBox.style.display = alerts.length ? 'block' : 'none';
        alertList.innerHTML = alerts.join('');
    }

    function op(i, type) {
        const v = parseFloat(document.getElementById(`in-${i}`).value);
        if (!v || v <= 0) return alert("請輸入數量");
        let item = inventoryData[i];
        if (type === 'tran' && item.freezerStock >= v) { item.freezerStock -= v; item.chillerStock += v; }
        else if (type === 'cons' && item.chillerStock >= v) { item.chillerStock -= v; }
        else if (type === 'supp') { item.freezerStock += v; }
        else return alert("庫存不足");
        db.ref('inventory/' + i).update({freezerStock: item.freezerStock, chillerStock: item.chillerStock});
        db.ref('logs').push({time: new Date().toLocaleTimeString(), text: `${type} ${item.name} ${v}`});
    }

    function updateVal(i, key, val) { db.ref('inventory/' + i).update({[key]: parseFloat(val)}); }
    function clearLogs() { db.ref('logs').remove(); }
</script>
</body>
