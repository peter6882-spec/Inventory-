    function initializeDatabase() {
        db.ref('inventory').on('value', (snapshot) => {
            if (snapshot.exists()) {
                inventoryData = snapshot.val();
                statusDiv.innerHTML = "🟢 已與 Firebase 雲端即時連線！";
                statusDiv.style.backgroundColor = "#e8f5e9";
                statusDiv.style.color = "#2e7d32";
            } else {
                db.ref('inventory').set(defaultData);
                inventoryData = defaultData;
            }
            renderTable();
        });

        db.ref('logs').limitToLast(20).on('value', (snapshot) => {
            let logsHtml = "";
            snapshot.forEach(child => {
                const log = child.val();
                logsHtml = `<div style="margin-bottom:6px; border-bottom:1px solid #eee; padding-bottom:6px;"><span style="color:#999;">[${log.time}]</span> <span style="margin-left:10px;">${log.text}</span></div>` + logsHtml;
            });
            document.getElementById('logContainer').innerHTML = logsHtml || '<div style="text-align:center; color:#bbb;">暫無紀錄</div>';
        });
    }

    function handleStockAction(index, actionType) {
        const inputElem = document.getElementById(`input-${index}`);
        const val = parseFloat(inputElem.value);
        if (isNaN(val) || val <= 0) return alert("請輸入大於 0 的數量！");
        
        const item = inventoryData[index];
        let logText = "";

        if (actionType === 'transfer') {
            if (item.freezerStock < val) return alert("大倉總庫存量不足！");
            item.freezerStock = parseFloat((item.freezerStock - val).toFixed(3));
            item.chillerStock = parseFloat((item.chillerStock + val).toFixed(3));
            logText = `🔄 移出備用：【${item.name}】移至現場 +${val} (大倉剩餘: ${item.freezerStock})`;
        } else if (actionType === 'consume') {
            if (item.chillerStock < val) return alert("現場存量不足以扣除！");
            item.chillerStock = parseFloat((item.chillerStock - val).toFixed(3));
            logText = `📤 現場消耗：【${item.name}】扣除 -${val} (現場剩餘: ${item.chillerStock})`;
        } else if (actionType === 'supplier') {
            item.freezerStock = parseFloat((item.freezerStock + val).toFixed(3));
            logText = `📦 進貨入庫：【${item.name}】大倉增加 +${val} (大倉最新: ${item.freezerStock})`;
        }

        db.ref('inventory/' + index).update({
            freezerStock: item.freezerStock,
            chillerStock: item.chillerStock
        });

        const timeStr = new Date().toLocaleTimeString('zh-TW', {hour12: false});
        db.ref('logs').push({ time: timeStr, text: logText });

        inputElem.value = '';
    }

    function updateThreshold(index, newVal) {
        db.ref('inventory/' + index).update({ threshold: parseFloat(newVal) || 0 });
    }

    function clearLogs() {
        if(confirm('確定要清除雲端上的所有紀錄嗎？')) {
            db.ref('logs').remove();
        }
    }

    function filterCategory(cat) {
        currentCategoryFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent === cat || (cat === '全部' && btn.textContent === '全部品項'));
        });
        renderTable();
    }

    function renderTable() {
        if (!inventoryData || inventoryData.length === 0) return;
        
        const tbody = document.getElementById('inventoryBody');
        const alertBox = document.getElementById('alertBox');
        const alertList = document.getElementById('alertList');
        
        tbody.innerHTML = '';
        let lowItemsHtml = '';
        let lowCount = 0;

        inventoryData.forEach((item, index) => {
            if (currentCategoryFilter !== '全部' && item.category !== currentCategoryFilter) return;

            const isLow = item.freezerStock <= item.threshold;
            if (isLow) {
                lowCount++;
                lowItemsHtml += `<li>【${item.category}】${item.name} (大倉剩餘: <strong>${item.freezerStock}</strong> ${item.unit})</li>`;
            }

            tbody.innerHTML += `
                <tr class="${isLow ? 'low-stock' : ''}">
                    <td style="color:#777; font-size:13px;">${item.category}</td>
                    <td style="text-align: left;"><strong>${item.name}</strong></td>
                    <td><input type="number" value="${item.threshold}" style="width:45px; text-align:center;" onchange="updateThreshold(${index}, this.value)"></td>
                    <td style="font-size:15px; font-weight:bold; color: ${isLow ? '#c62828' : '#455a64'};">${item.freezerStock} <small>${item.unit}</small></td>
                    <td>
                        <div class="action-group">
                            <input type="number" id="input-${index}" class="qty-input" min="0" step="any" placeholder="數量">
                            <button class="btn-op btn-transfer" onclick="handleStockAction(${index}, 'transfer')">🔄 移至現場</button>
                            <button class="btn-op btn-consume" onclick="handleStockAction(${index}, 'consume')">－ 消耗</button>
                            <button class="btn-op btn-supplier" onclick="handleStockAction(${index}, 'supplier')">＋ 大倉進貨</button>
                        </div>
                    </td>
                    <td style="font-size:15px; font-weight:bold; color: #1565c0;">${item.chillerStock} <small>${item.unit}</small></td>
                    <td>${isLow ? '<span style="color:#c62828;font-weight:bold;">⚠️ 補貨</span>' : '<span style="color:#2e7d32;">✅ 充足</span>'}</td>
                </tr>
            `;
        });

        if (lowCount > 0) {
            alertList.innerHTML = lowItemsHtml;
            alertBox.style.display = 'block';
        } else {
            alertBox.style.display = 'none';
        }
    }
</script>
</body>
</html>
