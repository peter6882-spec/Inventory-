<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蔡叔叔比薩屋 - 雲端即時庫存系統</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<style>
:root { --primary-color: #2e7d32; --danger-color: #c62828; }
body { font-family: sans-serif; background: #f4f6f8; padding: 20px; }
.container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
.login-container { text-align: center; margin-top: 100px; }
.google-btn { padding: 12px 24px; background: #4285F4; color: white; border: none; cursor: pointer; border-radius: 6px; }
</style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <h2>蔡叔叔比薩屋 - 系統登入</h2>
    <button class="google-btn" onclick="loginWithGoogle()">使用 Google 帳號登入</button>
    <p id="loginError" style="color:red;"></p>
</div>

<div id="mainContent" class="container" style="display: none;">
    <h1>蔡叔叔比薩屋庫存</h1>
    <button onclick="logout()">登出</button>
    <div id="inventoryBody">資料載入中...</div>
</div>

<script>
// ⚠️ 請在此處填入您的金鑰，並確保不要有多餘符號
const firebaseConfig = {
    apiKey: "AIzaSyD14l_VDz03TCD6AwjGF6Oa5nrEqX1LWIk",
    authDomain: "inv3-84f00.firebaseapp.com",
    databaseURL: "https://inv3-84f00-default-rtdb.firebaseio.com",
    projectId: "inv3-84f00",
    storageBucket: "inv3-84f00.firebasestorage.app",
    messagingSenderId: "328169054973",
    appId: "1:328169054973:web:f23bb36d266b7719eed494"
};

const allowedEmails = ["peter6882@gmail.com","caishushupizza@gmail.com","crystleflute@gmail.com","robintsai0329@gmail.com"];

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

window.loginWithGoogle = function() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(e => alert(e.message));
};

window.logout = function() {
    auth.signOut().then(() => window.location.reload());
};

auth.onAuthStateChanged((user) => {
    if (user && allowedEmails.includes(user.email.toLowerCase())) {
        document.getElementById('loginScreen').style.display = "none";
        document.getElementById('mainContent').style.display = "block";
    } else {
        if (user) auth.signOut();
        document.getElementById('loginScreen').style.display = "block";
        document.getElementById('mainContent').style.display = "none";
    }
});
</script>
</body>
</html>
